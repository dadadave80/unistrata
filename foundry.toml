[profile.default]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = ".forge-snapshots/"}, {access = "read-write", path = "sim/"}]
libs = ["lib"]
out = "out"
solc_version = "0.8.30"
src = "src"
via_ir = false

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[invariant]
runs = 256
depth = 30
fail_on_revert = false
# CI can crank runs up (brief §6 targets ~10k): forge test --match-path 'test/invariant/*' with FOUNDRY_INVARIANT_RUNS=10000
