[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "osaka"
solc_version = "0.8.34"
optimizer_runs = 200 # UnistrataHook (with the Permit2 deposit path) must fit the 24KB limit; higher runs bloat it past
via_ir = false
ffi = true
fs_permissions = [
    { access = "read-write", path = ".forge-snapshots/" },
    { access = "read-write", path = "sim/" },
    { access = "read-write", path = ".env" },
]
# Disable metadata hash for deterministic bytecode
bytecode_hash = "none"
cbor_metadata = false

[fmt]
sort_imports = true

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[invariant]
runs = 256
depth = 30
fail_on_revert = false
# CI can crank runs up (brief §6 targets ~10k): forge test --match-path 'test/invariant/*' with FOUNDRY_INVARIANT_RUNS=10000

[rpc_endpoints]
unichain_sep = "${UNICHAIN_SEPOLIA_URL}"
reactive_lasna = "${REACTIVE_LASNA_URL}"
