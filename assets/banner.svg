<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Unistrata — a Uniswap v4 pool, priced as a capital structure">
  <title>Unistrata</title>
  <desc>A Uniswap v4 pool, priced as a capital structure: a senior Bedrock coupon over a junior Sediment first-loss tranche.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1113"/>
      <stop offset="1" stop-color="#070A0B"/>
    </linearGradient>
    <linearGradient id="strata" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#EBC487"/>
      <stop offset="0.16" stop-color="#DD9F52"/>
      <stop offset="0.34" stop-color="#C57B33"/>
      <stop offset="0.50" stop-color="#8C5E2B"/>
      <stop offset="0.60" stop-color="#3C7E8D"/>
      <stop offset="0.80" stop-color="#2C6573"/>
      <stop offset="1"    stop-color="#1B454F"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#6DB4C0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6DB4C0" stop-opacity="0.7"/>
      <stop offset="1"   stop-color="#6DB4C0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#rule)"/>

  <!-- ░░ left: wordmark + thesis ░░ -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="74" y="92" fill="#6DB4C0" font-size="14" font-weight="600" letter-spacing="3.5">UNISWAP&#160;v4&#160;HOOK &#183; REACTIVE-SETTLED &#183; ORACLE-FREE</text>

    <text x="70" y="178" fill="#F2EFE8" font-size="84" font-weight="800" letter-spacing="0.5">Unistrata</text>

    <text x="74" y="220" fill="#AEB6B4" font-size="23" font-weight="500">A Uniswap v4 pool, priced as a capital structure.</text>

    <g font-size="15" font-weight="500">
      <circle cx="80" cy="250" r="5" fill="#6DB4C0"/>
      <text x="92" y="255" fill="#C9CECC">Bedrock &#183; senior, protected coupon</text>
      <circle cx="390" cy="250" r="5" fill="#DD9F52"/>
      <text x="402" y="255" fill="#C9CECC">Sediment &#183; junior, first-loss</text>
    </g>
  </g>

  <!-- ░░ right: the core sample (capital stack) ░░ -->
  <g>
    <rect x="872" y="44" width="256" height="212" rx="14" fill="url(#strata)"/>
    <!-- strata hairlines -->
    <g stroke="#06090A" stroke-opacity="0.32" stroke-width="1.5">
      <line x1="872" y1="74"  x2="1128" y2="74"/>
      <line x1="872" y1="100" x2="1128" y2="100"/>
      <line x1="872" y1="124" x2="1128" y2="124"/>
      <line x1="872" y1="180" x2="1128" y2="180"/>
      <line x1="872" y1="208" x2="1128" y2="208"/>
      <line x1="872" y1="232" x2="1128" y2="232"/>
    </g>
    <!-- the floor: Bedrock/Sediment interface -->
    <line x1="872" y1="152" x2="1128" y2="152" stroke="#D6EEF2" stroke-opacity="0.55" stroke-width="2"/>

    <g font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif">
      <text x="896" y="92"  fill="#3A2516" font-size="15" font-weight="700" letter-spacing="2.5">SEDIMENT</text>
      <text x="896" y="111" fill="#4E311C" font-size="11.5" font-weight="600" letter-spacing="0.5">junior &#183; absorbs the IL</text>

      <text x="896" y="200" fill="#E2F4F7" font-size="15" font-weight="700" letter-spacing="2.5">BEDROCK</text>
      <text x="896" y="219" fill="#BFE2E8" font-size="11.5" font-weight="600" letter-spacing="0.5">senior &#183; principal held flat</text>
    </g>
  </g>
</svg>
