<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unistrata — a liquidity pool, priced as a capital structure</title>
<link rel="icon" href="../../assets/strata-mark.svg">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-app); }
  #app { min-height: 100%; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <script src="../../_ds_bundle.js"></script>
  <script>window.StrataDesignSystem_8a0ec2||document.write('<scr'+'ipt src="../../ds-runtime.js"><\/scr'+'ipt>');</script>
  <script src="data.js"></script>

  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="Deposit.jsx"></script>
  <script type="text/babel" src="Observatory.jsx"></script>
  <script type="text/babel" src="Simulator.jsx"></script>

  <script type="text/babel" data-presets="react">
    const SD = window.StrataData;
    function App() {
      const params = new URLSearchParams(location.search);
      const [screen, setScreen] = React.useState(params.get('screen') || 'landing');
      const [core, setCore] = React.useState({ seniorNav: SD.SENIOR0, juniorNav: SD.JUNIOR0, sweepKey: 0 });

      const runSettlement = React.useCallback(() => {
        setCore(c => {
          const coupon = SD.SENIOR0 * 0.072 * (8 / 8760);  // 8h coupon
          const fees = 2400 + Math.random() * 2600;
          return { seniorNav: c.seniorNav + coupon, juniorNav: c.juniorNav + fees - coupon, sweepKey: c.sweepKey + 1 };
        });
      }, []);

      // gentle ambient settlement so the Core reads as alive
      React.useEffect(() => {
        let t;
        const loop = () => {
          if (!document.hidden && (screen === 'landing' || screen === 'observatory')) runSettlement();
          t = setTimeout(loop, 9000);
        };
        t = setTimeout(loop, 5000);
        return () => clearTimeout(t);
      }, [screen, runSettlement]);

      const nav = (s) => {
        setScreen(s);
        const u = new URL(location); u.searchParams.set('screen', s); history.replaceState(null, '', u);
        window.scrollTo({ top: 0 });
      };

      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [screen]);

      let view;
      if (screen === 'deposit') view = <window.Deposit />;
      else if (screen === 'observatory') view = <window.Observatory core={core} onSettle={runSettlement} />;
      else if (screen === 'simulator') view = <window.Simulator />;
      else view = <window.Landing core={core} onSettle={runSettlement} onNav={nav} />;

      return (
        <window.AppShell screen={screen} onNav={nav} seniorNav={core.seniorNav} juniorNav={core.juniorNav} sweepKey={core.sweepKey}>
          {view}
        </window.AppShell>
      );
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
