<!-- @dsCard group="Colors" viewport="700x180" name="Bedrock — mineral teal" subtitle="The Bedrock (senior) tranche: calm, dense, stable." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../_card.css">
</head>
<body>
  <div class="swatches" style="grid-template-columns: repeat(10, 1fr);">
    <div class="swatch" style="background:var(--senior-50);"><span class="hex" style="color:#0C1D24">50</span></div>
    <div class="swatch" style="background:var(--senior-100);"><span class="hex" style="color:#0C1D24">100</span></div>
    <div class="swatch" style="background:var(--senior-200);"><span class="hex" style="color:#0C1D24">200</span></div>
    <div class="swatch" style="background:var(--senior-300);"><span class="hex" style="color:#0C1D24">300</span></div>
    <div class="swatch" style="background:var(--senior-400);"><span class="hex" style="color:#06181D">400</span></div>
    <div class="swatch" style="background:var(--senior-500);"><span class="hex" style="color:#DCEEF1">500</span></div>
    <div class="swatch" style="background:var(--senior-600);"><span class="hex" style="color:#DCEEF1">600</span></div>
    <div class="swatch" style="background:var(--senior-700);"><span class="hex" style="color:#C2E2E7">700</span></div>
    <div class="swatch" style="background:var(--senior-800);"><span class="hex" style="color:#97CDD6">800</span></div>
    <div class="swatch" style="background:var(--senior-900);"><span class="hex" style="color:#6DB4C0">900</span></div>
  </div>
  <div class="card-row spread" style="margin-top:12px;">
    <span class="label"><b style="color:var(--senior-300)">●</b>&nbsp; <code class="mono" style="color:var(--text-secondary)">--senior</code> = 400 &nbsp;·&nbsp; fill = 900 &nbsp;·&nbsp; edge = 300</span>
    <span class="label" style="color:var(--senior-300)">#4E97A6</span>
  </div>
</body>
</html>
