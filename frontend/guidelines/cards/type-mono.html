<!-- @dsCard group="Type" viewport="700x210" name="Mono — IBM Plex Mono (numbers)" subtitle="Tabular, lining figures. Numbers are the protagonists." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../_card.css">
<style>
  .big { font-family:var(--font-mono); font-variant-numeric: tabular-nums lining-nums; font-feature-settings: var(--data-feature-settings); }
</style>
</head>
<body>
  <div class="card-row spread center">
    <span class="label">IBM Plex Mono · tnum · lnum</span>
    <span class="label">data · ledger · gauges</span>
  </div>
  <div class="card-row" style="gap:28px; margin-top:14px; align-items:flex-end;">
    <div>
      <div class="label" style="margin-bottom:4px;">TVL</div>
      <div class="big" style="font-size:38px; color:var(--text-primary); font-weight:500;">$2,403,910</div>
    </div>
    <div>
      <div class="label" style="margin-bottom:4px;">Bedrock coupon</div>
      <div class="big" style="font-size:38px; color:var(--senior-300); font-weight:500;">7.2%</div>
    </div>
    <div>
      <div class="label" style="margin-bottom:4px;">Sediment trailing</div>
      <div class="big" style="font-size:38px; color:var(--junior-300); font-weight:500;">23.4%</div>
    </div>
  </div>
  <div class="big" style="margin-top:16px; font-size:13px; color:var(--text-secondary); letter-spacing:0.01em;">
    σ² = 0.41%/day &nbsp;·&nbsp; epoch 47 &nbsp;·&nbsp; settles in 03:12:09 &nbsp;·&nbsp; 0x7a3f…e201
  </div>
  <div class="big" style="margin-top:8px; font-size:13px; color:var(--text-tertiary); letter-spacing:0.06em;">0123456789 — aligned in columns</div>
</body>
</html>
