<!-- @dsCard group="Brand" viewport="700x200" name="Logo — the core sample" subtitle="Mark abstracts the Unistrata Core: dense Bedrock under Sediment." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../_card.css">
<style>
  .lockup { display:flex; align-items:center; gap:14px; }
  .lockup .wm { font-family:var(--font-display); font-weight:500; font-size:34px; letter-spacing:-0.02em; color:var(--text-primary); }
  .sizes { display:flex; align-items:flex-end; gap:20px; }
  .sizes .s { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .sizes .k { font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="card-row spread center">
    <div class="lockup">
      <img src="../../assets/strata-mark.svg" width="48" height="48" alt="Unistrata">
      <span class="wm">Unistrata</span>
    </div>
    <span class="label" style="text-align:right; max-width:30ch;">Bedrock holds its line; Sediment sits above; overburden fades to the surface.</span>
  </div>
  <div class="sizes" style="margin-top:26px;">
    <div class="s"><img src="../../assets/strata-mark.svg" width="64" height="64" alt=""><span class="k">64</span></div>
    <div class="s"><img src="../../assets/strata-mark.svg" width="40" height="40" alt=""><span class="k">40</span></div>
    <div class="s"><img src="../../assets/strata-mark.svg" width="28" height="28" alt=""><span class="k">28</span></div>
    <div class="s"><img src="../../assets/strata-mark.svg" width="20" height="20" alt=""><span class="k">20 · nav glyph</span></div>
    <div class="s" style="margin-left:14px;"><img src="../../assets/strata-mark-mono.svg" width="40" height="40" alt="" style="color:var(--text-primary)"><span class="k">mono</span></div>
    <div class="s"><span style="display:inline-flex; padding:8px; background:var(--paper-100); border-radius:8px;"><img src="../../assets/strata-mark-mono.svg" width="32" height="32" alt="" style="color:var(--ink-950)"></span><span class="k">on light</span></div>
  </div>
</body>
</html>
