<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid, 1–112px." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="../_card.css">
<style>
  .sp { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
  .sp .bar { background: var(--senior-700); height:14px; border-radius:2px; box-shadow: inset 0 0 0 1px var(--senior-600); }
  .sp .k { font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary); }
</style>
</head>
<body>
  <div class="card-row" style="gap:18px; align-items:flex-end;">
    <div class="sp"><div class="bar" style="width:4px;"></div><span class="k">1 · 4</span></div>
    <div class="sp"><div class="bar" style="width:8px;"></div><span class="k">2 · 8</span></div>
    <div class="sp"><div class="bar" style="width:12px;"></div><span class="k">3 · 12</span></div>
    <div class="sp"><div class="bar" style="width:16px;"></div><span class="k">4 · 16</span></div>
    <div class="sp"><div class="bar" style="width:20px;"></div><span class="k">5 · 20</span></div>
    <div class="sp"><div class="bar" style="width:24px;"></div><span class="k">6 · 24</span></div>
    <div class="sp"><div class="bar" style="width:32px;"></div><span class="k">7 · 32</span></div>
    <div class="sp"><div class="bar" style="width:40px;"></div><span class="k">8 · 40</span></div>
    <div class="sp"><div class="bar" style="width:48px;"></div><span class="k">9 · 48</span></div>
    <div class="sp"><div class="bar" style="width:64px;"></div><span class="k">10 · 64</span></div>
    <div class="sp"><div class="bar" style="width:80px;"></div><span class="k">11 · 80</span></div>
  </div>
  <div class="label" style="margin-top:16px;">Tight, regular rhythm — instrument-panel density. Gutter = space-7 (32).</div>
</body>
</html>
